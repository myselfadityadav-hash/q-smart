# Reference infrastructure for the Q-Smart production target stack.
#
# NOTE: In this sandbox the MVP runs natively (Next.js on :3000 + the Node/TS
# backend mini-service on :3003/:3004) — see the root README. This compose file
# provisions the exact infrastructure requested in the spec (Postgres + Redis)
# for the Python/FastAPI target deployment.

services:
  postgres:
    image: postgres:16-alpine
    container_name: qsmart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qsmart
      POSTGRES_PASSWORD: qsmart
      POSTGRES_DB: qsmart
    ports:
      - "5432:5432"
    volumes:
      - qsmart_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qsmart"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qsmart-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - qsmart_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  qsmart_pgdata:
  qsmart_redisdata:
