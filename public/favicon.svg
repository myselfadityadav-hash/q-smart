<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Q-Smart">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="55%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
  </defs>

  <!-- Background with gradient, rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)" />

  <!-- The Q letter mark, sized for favicon legibility -->
  <circle cx="30" cy="30" r="15" fill="none" stroke="#ffffff" stroke-width="5" />
  <rect x="38" y="38" width="12" height="5" rx="2.5" fill="#ffffff" transform="rotate(45 38 38)" />
</svg>
